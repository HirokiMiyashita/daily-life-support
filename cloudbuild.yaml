steps:
  - name: gcr.io/cloud-builders/docker
    id: Build image
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:${_IMAGE_TAG}
      - apps/api

  - name: gcr.io/cloud-builders/docker
    id: Push image
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:${_IMAGE_TAG}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy Cloud Run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:${_IMAGE_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --timeout=300
      - --set-env-vars=OPENAI_BASE_URL=${_OPENAI_BASE_URL},OPENAI_MODEL=${_OPENAI_MODEL},SUPABASE_URL=${_SUPABASE_URL}
      - --set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:${_IMAGE_TAG}

substitutions:
  _REGION: asia-northeast1
  _REPO: daily-life-support
  _SERVICE: daily-life-support-api
  _IMAGE_TAG: latest
  _OPENAI_BASE_URL: https://api.openai.com/v1
  _OPENAI_MODEL: gpt-4o-mini
  _SUPABASE_URL: https://YOUR_PROJECT_REF.supabase.co
