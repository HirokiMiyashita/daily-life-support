name: Deploy API to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api-cloud-run.yml"

concurrency:
  group: deploy-api-cloud-run
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      GCP_REGION: asia-northeast1
      ARTIFACT_REPO: daily-life-support
      CLOUD_RUN_SERVICE: daily-life-support-api
      OPENAI_BASE_URL: https://api.openai.com/v1
      OPENAI_MODEL: gpt-4o-mini

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "${ARTIFACT_REPO}" \
            --location="${GCP_REGION}" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "${ARTIFACT_REPO}" \
            --repository-format=docker \
            --location="${GCP_REGION}"

      - name: Build and push API image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/api:${IMAGE_TAG}"
          docker build -f apps/api/Dockerfile -t "${IMAGE_URI}" apps/api
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --image="${IMAGE_URI}" \
            --port=8080 \
            --timeout=300 \
            --update-env-vars="OPENAI_BASE_URL=${OPENAI_BASE_URL},OPENAI_MODEL=${OPENAI_MODEL},SUPABASE_URL=${SUPABASE_URL}" \
            --update-secrets="OPENAI_API_KEY=OPENAI_API_KEY:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest"
